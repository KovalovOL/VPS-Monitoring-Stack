server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
    pipeline_stages:
      # Docker writes logs wrapped in a JSON structure: {"log": "...", "stream": "...", "time": "..."}
      - json:
          expressions:
            log_line: log
      # Parse the actual nested JSON application log
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            timestamp: timestamp
          source: log_line
      # Promote the log level and python logger module name to Loki labels
      - labels:
          level:
          logger:
      # Use the application's actual log timestamp instead of Promtail's ingestion time
      - timestamp:
          source: timestamp
          format: RFC3339
      # Overwrite the log line content with just the clean, readable message
      - output:
          source: message
